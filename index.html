// ── SEGURANÇA — SHA-256 via Web Crypto API ────────────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function tempoAtras(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return "agora mesmo";
  if (m < 60) return `${m} min atrás`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h atrás`;
  return `${Math.floor(h/24)} dias atrás`;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [usuario,       setUsuario]       = useState(null);
  const [alunos,        setAlunos]        = useState(ALUNOS_INICIAIS);
  const [comunicados,   setComunicados]   = useState(COMUNICADOS_INICIAIS);
  const [mensagens,     setMensagens]     = useState(MENSAGENS_INICIAIS);
  const [themeKey,      setThemeKey]      = useState("padrao");
  const [appBloqueado,  setAppBloqueado]  = useState(false);
  const [telaPropriet,  setTelaPropriet]  = useState(false);
  const [nomeEscola,    setNomeEscola]    = useState("CETI");
  const [telEscola,     setTelEscola]     = useState("(92) 99276-7068");
  const [whatsEscola,   setWhatsEscola]   = useState("5592992767068");
  const th = THEMES[themeKey];

  const [presencas, setPresencas] = useState({});
  const [fbPronto, setFbPronto] = useState(false);

  // ── FIREBASE: sincronização em tempo real ─────────────────────────────────
  useEffect(() => {
    const conectar = () => {
      const db = window._firebaseDB;
      const fbRef = window._firebaseRef;
      const onValue = window._firebaseOnValue;
      if (!db) return;
      setFbPronto(true);

      // Comunicados
      onValue(fbRef(db, 'comunicados'), snap => {
        const val = snap.val();
        if (val) setComunicados(Object.values(val).sort((a,b) => new Date(b.data) - new Date(a.data)));
      });

      // Alunos
      onValue(fbRef(db, 'alunos'), snap => {
        const val = snap.val();
        if (val) setAlunos(Object.values(val));
      });

      // Mensagens
      onValue(fbRef(db, 'mensagens'), snap => {
        const val = snap.val();
        if (val) setMensagens(val);
      });

      // App bloqueado
      onValue(fbRef(db, 'config/bloqueado'), snap => {
        const val = snap.val();
        if (val !== null) setAppBloqueado(!!val);
      });

      // Presenças
      onValue(fbRef(db, 'presencas'), snap => {
        const val = snap.val();
        if (val) setPresencas(val);
      });

      // Turmas
      onValue(fbRef(db, 'config/turmas'), snap => {
        const val = snap.val();
        if (val && val.extras) window._turmasExtras = val.extras;
        if (val && val.excluidas) window._turmasExcluidas = val.excluidas;
      });

      // Config escola
      onValue(fbRef(db, 'config/escola'), snap => {
        const val = snap.val();
        if (val) {
          if (val.nome)  setNomeEscola(val.nome);
          if (val.tel)   setTelEscola(val.tel);
          if (val.whats) setWhatsEscola(val.whats);
        }
      });
    };

    if (window._firebaseReady) { conectar(); }
    else { window.addEventListener('firebase-ready', conectar); }
    return () => window.removeEventListener('firebase-ready', conectar);
  }, []);

  // ── FIREBASE: funções de escrita ──────────────────────────────────────────
  const fbSalvarComunicado = (aviso) => {
    const db = window._firebaseDB;
    if (!db) { setComunicados(prev => [aviso, ...prev]); return; }
    window._firebaseSet(window._firebaseRef(db, "comunicados/" + aviso.id), aviso);
  };

  const fbExcluirComunicado = (id) => {
    const db = window._firebaseDB;
    if (!db) { setComunicados(prev => prev.filter(x => x.id !== id)); return; }
    window._firebaseRemove(window._firebaseRef(db, "comunicados/" + id));
  };

  const fbSalvarAluno = (aluno) => {
    const db = window._firebaseDB;
    if (!db) { setAlunos(prev => { const idx = prev.findIndex(a=>a.id===aluno.id); return idx>=0 ? prev.map(a=>a.id===aluno.id?aluno:a) : [...prev,aluno]; }); return; }
    window._firebaseSet(window._firebaseRef(db, "alunos/" + aluno.id), aluno);
  };

  const fbExcluirAluno = (id) => {
    const db = window._firebaseDB;
    if (!db) { setAlunos(prev => prev.filter(a => a.id !== id)); return; }
    window._firebaseRemove(window._firebaseRef(db, "alunos/" + id));
  };

  const fbEnviarMensagem = (paiId, msg) => {
    const db = window._firebaseDB;
    if (!db) { setMensagens(prev => ({ ...prev, [paiId]: [...(prev[paiId]||[]), msg] })); return; }
    const novas = [...(mensagens[paiId]||[]), msg];
    window._firebaseSet(window._firebaseRef(db, "mensagens/" + paiId), novas);
  };

  const fbSetBloqueado = (val) => {
    const db = window._firebaseDB;
    if (!db) { setAppBloqueado(val); return; }
    window._firebaseSet(window._firebaseRef(db, 'config/bloqueado'), val);
  };

  const fbSalvarConfigEscola = (nome, tel, whats) => {
    const db = window._firebaseDB;
    if (!db) return;
    window._firebaseSet(window._firebaseRef(db, 'config/escola'), { nome, tel, whats });
  };

  const fbSalvarTurmas = (extras, excluidas) => {
    const db = window._firebaseDB;
    if (!db) return;
    window._firebaseSet(window._firebaseRef(db, 'config/turmas'), { extras: extras || [], excluidas: excluidas || [] });
  };

  const fbSalvarPresenca = (reuniaoId, usuarioId, valor) => {
    const db = window._firebaseDB;
    const novo = { ...presencas, [reuniaoId]: { ...(presencas[reuniaoId]||{}), [usuarioId]: valor } };
    if (!db) { setPresencas(novo); return; }
    window._firebaseSet(window._firebaseRef(db, "presencas/" + reuniaoId + "/" + usuarioId), valor);
  };

  const todosPerfis = [...USUARIOS_ESCOLA, ...alunos];

  const login = async (email, senha) => {
    const hash = await sha256(senha.trim());
    return todosPerfis.find(u =>
      u.email.toLowerCase().trim() === email.toLowerCase().trim() &&
      u.senha === hash
    ) || null;
  };

  if (appBloqueado) return <TelaBloqueada whatsEscola={whatsEscola} telEscola={telEscola} onDesbloquear={() => setAppBloqueado(false)} />;

  if (telaPropriet) return (
    <TelaProprietario
      nomeEscola={nomeEscola} setNomeEscola={setNomeEscola}
      telEscola={telEscola}   setTelEscola={setTelEscola}
      whatsEscola={whatsEscola} setWhatsEscola={setWhatsEscola}
      alunos={alunos} onSalvarAluno={fbSalvarAluno} onExcluirAluno={fbExcluirAluno}
      comunicados={comunicados} onExcluirComunicado={fbExcluirComunicado}
      themeKey={themeKey} onChangeTheme={setThemeKey}
      appBloqueado={appBloqueado} onSetBloqueado={fbSetBloqueado}
      onSalvarConfigEscola={fbSalvarConfigEscola}
      onVoltar={() => setTelaPropriet(false)}
    />
  );

  if (!usuario) return <TelaLogin onLogin={u => setUsuario(u)} loginFn={login} th={th} themeKey={themeKey} onChangeTheme={setThemeKey} onAbrirPropriet={() => setTelaPropriet(true)} nomeEscola={nomeEscola} telEscola={telEscola} whatsEscola={whatsEscola} />;

  if (usuario.tipo === "escola") return (
    <TelaEscola usuario={usuario} comunicados={comunicados}
      onSalvarComunicado={fbSalvarComunicado} onExcluirComunicado={fbExcluirComunicado}
      mensagens={mensagens} onEnviarMensagem={fbEnviarMensagem}
      alunos={alunos} onSalvarAluno={fbSalvarAluno} onExcluirAluno={fbExcluirAluno}
      onSalvarTurmas={fbSalvarTurmas}
      presencas={presencas}
      onSair={() => setUsuario(null)} th={th} themeKey={themeKey} onChangeTheme={setThemeKey} />
  );

  return (
    <TelaPai usuario={usuario} comunicados={comunicados}
      mensagens={mensagens} onEnviarMensagem={(txt) => fbEnviarMensagem(usuario.id, { id:Date.now(), de:"pai", texto:txt, data:new Date().toISOString() })}
      presencas={presencas} onConfirmarPresenca={(rId, val) => fbSalvarPresenca(rId, usuario.id, val)}
      onSair={() => setUsuario(null)} th={th} themeKey={themeKey} onChangeTheme={setThemeKey} />
  );
}

// ── TELA LOGIN ────────────────────────────────────────────────────────────────
function TelaLogin({ onLogin, loginFn, th, themeKey, onChangeTheme, onAbrirPropriet, nomeEscola, telEscola, whatsEscola }) {

  const [senha, setSenha]     = useState("");

  const [loading, setLoading] = useState(false);

  // Modal proprietário
  const [modalPropriet, setModalPropriet] = useState(false);
  const [etapaPropriet, setEtapaPropriet] = useState(1); // 1=palavra-chave, 2=login
  const [pEmail, setPEmail]   = useState("");
  const [pSenha, setPSenha]   = useState("");
  const [pPalavra, setPPalavra] = useState("");
  const [pErro, setPErro]     = useState("");

  // Credenciais do proprietário — armazenadas como SHA-256
  // sha256("Atlanta")      = a6c2221569febb76282953aabf85f648511cbe327a8b20580e6029998184cdeb
  // sha256("escola@gmail.com") = comparado em lowercase antes de hash
  // sha256("Bra24071996$") = 94f91d251f7f2ea8679e29f2dae78ab5fc066713a4fd499e075e0a542421068a
  const PROPRIETARIO = {
    email: "escola@gmail.com",
    senhaHash: "94f91d251f7f2ea8679e29f2dae78ab5fc066713a4fd499e075e0a542421068a",
    palavraChaveHash: "d3ecc5b7fe38ffd3397473362f2c42321fb82deb23083ed13cf6f20320ab6c92",
  };

  const entrar = () => {
    setErro("");
    const emailTrim = email.trim();
    const senhaTrim = senha.trim();
    if (!emailTrim || !senhaTrim) { setErro("Preencha o login e a senha."); return; }
    setLoading(true);
    loginFn(emailTrim, senhaTrim).then(u => {
      if (u) { onLogin(u); } else { setErro("Login ou senha incorretos."); setLoading(false); }
    });
  };

  const verificarPalavra = async () => {
    setPErro("");
    const hash = await sha256(pPalavra.trim().toLowerCase());
    if (hash !== PROPRIETARIO.palavraChaveHash) { setPErro("Palavra-chave incorreta."); return; }
    setEtapaPropriet(2);
    setPErro("");

  const entrarPropriet = async () => {
    setPErro("");
    if (pEmail.trim().toLowerCase() !== PROPRIETARIO.email.toLowerCase()) { setPErro("E-mail incorreto."); return; }
    const hash = await sha256(pSenha);
    if (hash !== PROPRIETARIO.senhaHash) { setPErro("Senha incorreta."); return; }
    setModalPropriet(false);
    setEtapaPropriet(1);
    onAbrirPropriet();

      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');*{box-sizing:border-box}`}</style>

      {/* Ícone oculto proprietário — 2 cliques rápidos */}
      {(() => {
        return (
          <div
            onClick={() => {
              if (!window._propClicks) window._propClicks = 0;
              window._propClicks++;
              clearTimeout(window._propTimer);
              if (window._propClicks >= 2) { window._propClicks = 0; setModalPropriet(true); }
              else { window._propTimer = setTimeout(() => { window._propClicks = 0; }, 600); }

          />
        );

// ── ABA PRESENÇAS ─────────────────────────────────────────────────────────────
function AbaPresencas({ comunicados, alunos, presencas, th }) {
  const reunioes = comunicados.filter(c => c.tipo === "reuniao");

  if (reunioes.length === 0) return (
    <div style={{ textAlign:"center", padding:40, color:th.textMuted, fontSize:15 }}>Nenhuma reunião cadastrada ainda. ✅</div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {reunioes.map(r => {
        const respostas = presencas[r.id] || {};
        const confirmados = alunos.filter(a => respostas[a.id] === "sim");
        const ausentes    = alunos.filter(a => respostas[a.id] === "nao");
        const pendentes   = alunos.filter(a => !respostas[a.id]);
        const total       = alunos.length;

        return (
          <div key={r.id} style={{ background:th.card, borderRadius:18, padding:20, border:`2px solid ${th.cardBorder}` }}>
            <div style={{ fontSize:16, fontWeight:900, color:th.text, marginBottom:4 }}>👥 {r.titulo}</div>
            <div style={{ fontSize:12, color:th.textMuted, marginBottom:16 }}>Enviado por {r.autor}</div>

            {/* Barras de resumo */}
            <div style={{ display:"flex", gap:10, marginBottom:16 }}>
              <div style={{ flex:1, background:"#f0fff4", border:"2px solid #27ae60", borderRadius:14, padding:"12px 10px", textAlign:"center" }}>
                <div style={{ fontSize:28, fontWeight:900, color:"#27ae60" }}>{confirmados.length}</div>
                <div style={{ fontSize:12, fontWeight:700, color:"#27ae60" }}>✅ Confirmados</div>
              </div>
              <div style={{ flex:1, background:"#fff5f5", border:"2px solid #e74c3c", borderRadius:14, padding:"12px 10px", textAlign:"center" }}>
                <div style={{ fontSize:28, fontWeight:900, color:"#e74c3c" }}>{ausentes.length}</div>
                <div style={{ fontSize:12, fontWeight:700, color:"#e74c3c" }}>❌ Não vêm</div>
              </div>
              <div style={{ flex:1, background:th.badgeBg, border:`2px solid ${th.inputBorder}`, borderRadius:14, padding:"12px 10px", textAlign:"center" }}>
                <div style={{ fontSize:28, fontWeight:900, color:th.textSub }}>{pendentes.length}</div>
                <div style={{ fontSize:12, fontWeight:700, color:th.textSub }}>⏳ Pendentes</div>
              </div>
            </div>

            {/* Barra de progresso */}
            <div style={{ background:th.badgeBg, borderRadius:99, height:10, marginBottom:14, overflow:"hidden" }}>
              <div style={{ width:`${total ? (confirmados.length/total)*100 : 0}%`, background:"#27ae60", height:"100%", borderRadius:99, transition:"width 0.4s" }} />
            </div>
            <div style={{ fontSize:12, color:th.textMuted, marginBottom:16, textAlign:"right" }}>{total} responsáveis no total</div>

            {/* Listas */}
            {confirmados.length > 0 && (
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:800, color:"#27ae60", marginBottom:6 }}>✅ Confirmados</div>
                {confirmados.map(a => (
                  <div key={a.id} style={{ fontSize:13, color:th.text, padding:"6px 10px", background:"#f0fff4", borderRadius:8, marginBottom:4 }}>
                    {a.nome} <span style={{ color:th.textMuted }}>— {a.filho} · Turma {a.turma}</span>
                  </div>
                ))}
              </div>
            )}
            {ausentes.length > 0 && (
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:800, color:"#e74c3c", marginBottom:6 }}>❌ Não poderão comparecer</div>
                {ausentes.map(a => (
                  <div key={a.id} style={{ fontSize:13, color:th.text, padding:"6px 10px", background:"#fff5f5", borderRadius:8, marginBottom:4 }}>
                    {a.nome} <span style={{ color:th.textMuted }}>— {a.filho} · Turma {a.turma}</span>
                  </div>
                ))}
              </div>
            )}
            {pendentes.length > 0 && (
              <div>
                <div style={{ fontSize:13, fontWeight:800, color:th.textSub, marginBottom:6 }}>⏳ Aguardando resposta</div>
                {pendentes.map(a => (
                  <div key={a.id} style={{ fontSize:13, color:th.textMuted, padding:"6px 10px", background:th.badgeBg, borderRadius:8, marginBottom:4 }}>
                    {a.nome} <span style={{ color:th.textMuted }}>— {a.filho} · Turma {a.turma}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── GERENCIAR ALUNOS ──────────────────────────────────────────────────────────
function FormAluno({ inicial, modoNovo, onSalvar, onVoltar, th, turmasExtras, setTurmasExtras, turmasExcluidasInit, setTurmasExcluidasGlobal }) {
  const TURMAS_BASE = ["6A","6B","7A","7B","8A","8B","9A","9B"];
  const [turmasExcluidas, setTurmasExcluidas] = useState(turmasExcluidasInit || []);

  const todasTurmas = [...TURMAS_BASE.filter(t => !turmasExcluidas.includes(t)), ...turmasExtras];

  const [nomeAluno,   setNomeAluno]   = useState(inicial?.filho   || "");
  const [turma,       setTurma]       = useState(inicial?.turma   || "");
  const [nomeResp,    setNomeResp]    = useState(inicial?.nome    || "");
  const [email,       setEmail]       = useState(inicial?.email   || "");
  const [celular,     setCelular]     = useState(inicial?.celular  || "");
  const [celular2,    setCelular2]    = useState(inicial?.celular2 || "");
  const [senha,       setSenha]       = useState("");
  const [erro,        setErro]        = useState("");
  const [novaTurma,      setNovaTurma]      = useState("");
  const [addingTurma,    setAddingTurma]    = useState(false);
  const [editingTurma,   setEditingTurma]   = useState(false);
  const [editNomeAntigo, setEditNomeAntigo] = useState("");
  const [editNomeNovo,   setEditNomeNovo]   = useState("");
  const [deletingTurma,  setDeletingTurma]  = useState(false);

  const iS = { width:"100%", padding:"13px 15px", borderRadius:12, border:`2px solid ${th.inputBorder}`, fontSize:15, color:th.inputText, background:th.input, outline:"none", fontFamily:"'Nunito',sans-serif", marginBottom:14 };

  const adicionarTurma = () => {
    const t = novaTurma.trim().toUpperCase();
    if (!t) return;
    if (todasTurmas.includes(t)) { setNovaTurma(""); setAddingTurma(false); setTurma(t); return; }
    setTurmasExtras(prev => [...prev, t]);
    setTurma(t);
    setNovaTurma("");
    setAddingTurma(false);
  };

  const editarTurma = () => {
    const novo = editNomeNovo.trim().toUpperCase();
    if (!novo) return;
    const antigo = editNomeAntigo;
    if (turmasExtras.includes(antigo)) {
      setTurmasExtras(prev => prev.map(t => t === antigo ? novo : t));
    } else {
      // turma base: adiciona a versão editada como extra e marca para substituir visualmente
      setTurmasExtras(prev => [...prev, novo]);
    }
    if (turma === antigo) setTurma(novo);
    setEditingTurma(false);
    setEditNomeAntigo("");
    setEditNomeNovo("");
  };

  const excluirTurma = (t) => {
    if (turmasExtras.includes(t)) {
      setTurmasExtras(prev => prev.filter(x => x !== t));
    } else {
      setTurmasExcluidas(prev => [...prev, t]);
      if (setTurmasExcluidasGlobal) setTurmasExcluidasGlobal(prev => [...prev, t]);
    }
    if (turma === t) setTurma("");
    setDeletingTurma(false);
  };

  const confirmar = async () => {
    if (!nomeAluno.trim())                   { setErro("Informe o nome do aluno."); return; }
    if (!turma)                              { setErro("Escolha a turma."); return; }
    if (!nomeResp.trim())                    { setErro("Informe o nome do responsável."); return; }
    if (!email.trim()||!email.includes("@")) { setErro("Informe um e-mail válido."); return; }
    if (modoNovo && !senha.trim())           { setErro("Crie uma senha para o responsável."); return; }
    // Hash da nova senha (se informada), ou mantém o hash já armazenado
    const senhaFinal = senha.trim()
      ? await sha256(senha.trim())
      : (inicial?.senha || "");
    onSalvar({ filho:nomeAluno.trim(), turma, nome:nomeResp.trim(), email:email.trim(), celular:celular.trim(), celular2:celular2.trim(), senha:senhaFinal });
  };

  return (
    <div style={{ background:th.card, borderRadius:20, padding:20 }}>
      <button onClick={onVoltar} style={{ background:th.badgeBg, border:"none", color:th.btnPrimary, borderRadius:10, padding:"8px 14px", fontSize:13, fontWeight:700, cursor:"pointer", marginBottom:18, fontFamily:"'Nunito',sans-serif" }}>← Voltar</button>
      <div style={{ fontSize:20, fontWeight:900, color:th.text, marginBottom:20 }}>{modoNovo ? "➕ Cadastrar Aluno" : "✏️ Editar Cadastro"}</div>

      {/* Nome do aluno */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>👦 Nome do Aluno</label>
      <input value={nomeAluno} onChange={e=>setNomeAluno(e.target.value)} placeholder="Ex: Lucas Silva" style={iS} />

      {/* Turma */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:8 }}>🏫 Turma</label>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
        {todasTurmas.map(t => (
          <button key={t} onClick={() => setTurma(t)} style={{ padding:"10px 16px", borderRadius:10, border:`2px solid ${turma===t?th.btnPrimary:th.inputBorder}`, background:turma===t?th.btnPrimary:th.input, color:turma===t?th.btnText:th.text, fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>{t}</button>
        ))}
        {/* Botão adicionar nova turma */}
        {!addingTurma && !editingTurma && !deletingTurma && (
          <button onClick={()=>setAddingTurma(true)} style={{ padding:"10px 14px", borderRadius:10, border:`2px dashed ${th.inputBorder}`, background:"transparent", color:th.textSub, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>➕ Nova turma</button>
        )}
        {/* Botão editar turma */}
        {!addingTurma && !editingTurma && !deletingTurma && (
          <button onClick={()=>setEditingTurma(true)} style={{ padding:"10px 14px", borderRadius:10, border:`2px dashed ${th.inputBorder}`, background:"transparent", color:th.textSub, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✏️ Editar turma</button>
        )}
        {/* Botão excluir turma */}
        {!addingTurma && !editingTurma && !deletingTurma && (
          <button onClick={()=>setDeletingTurma(true)} style={{ padding:"10px 14px", borderRadius:10, border:`2px dashed ${th.urgente}`, background:"transparent", color:th.urgente, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>🗑️ Excluir turma</button>
        )}
      </div>
      {addingTurma && (
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <input value={novaTurma} onChange={e=>setNovaTurma(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adicionarTurma()} placeholder="Ex: 5A ou Maternal" autoFocus style={{ flex:1, padding:"11px 14px", borderRadius:10, border:`2px solid ${th.btnPrimary}`, fontSize:14, color:th.inputText, background:th.input, outline:"none", fontFamily:"'Nunito',sans-serif" }} />
          <button onClick={adicionarTurma} style={{ background:th.btnPrimary, color:th.btnText, border:"none", borderRadius:10, padding:"11px 16px", fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>OK</button>
          <button onClick={()=>{ setAddingTurma(false); setNovaTurma(""); }} style={{ background:th.input, color:th.textSub, border:`2px solid ${th.inputBorder}`, borderRadius:10, padding:"11px 14px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✕</button>
        </div>
      )}
      {editingTurma && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:13, fontWeight:700, color:th.textSub, marginBottom:8 }}>Qual turma deseja renomear?</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
            {todasTurmas.map(t => (
              <button key={t} onClick={()=>{ setEditNomeAntigo(t); setEditNomeNovo(t); }} style={{ padding:"9px 14px", borderRadius:10, border:`2px solid ${editNomeAntigo===t?th.btnPrimary:th.inputBorder}`, background:editNomeAntigo===t?th.btnPrimary:th.input, color:editNomeAntigo===t?th.btnText:th.text, fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>{t}</button>
            ))}
          </div>
          {editNomeAntigo && (
            <div style={{ display:"flex", gap:8 }}>
              <input value={editNomeNovo} onChange={e=>setEditNomeNovo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&editarTurma()} placeholder="Novo nome" autoFocus style={{ flex:1, padding:"11px 14px", borderRadius:10, border:`2px solid ${th.btnPrimary}`, fontSize:14, color:th.inputText, background:th.input, outline:"none", fontFamily:"'Nunito',sans-serif" }} />
              <button onClick={editarTurma} style={{ background:th.btnPrimary, color:th.btnText, border:"none", borderRadius:10, padding:"11px 16px", fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>OK</button>
              <button onClick={()=>{ setEditingTurma(false); setEditNomeAntigo(""); setEditNomeNovo(""); }} style={{ background:th.input, color:th.textSub, border:`2px solid ${th.inputBorder}`, borderRadius:10, padding:"11px 14px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✕</button>
            </div>
          )}
          {!editNomeAntigo && (
            <button onClick={()=>{ setEditingTurma(false); }} style={{ background:th.input, color:th.textSub, border:`2px solid ${th.inputBorder}`, borderRadius:10, padding:"9px 14px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✕ Cancelar</button>
          )}
        </div>
      )}
      {deletingTurma && (
        <div style={{ marginBottom:16, background:th.urgenteBg, borderRadius:14, padding:"14px 16px" }}>
          <div style={{ fontSize:13, fontWeight:700, color:th.urgente, marginBottom:8 }}>🗑️ Qual turma deseja excluir?</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
            {todasTurmas.map(t => (
              <button key={t} onClick={()=>excluirTurma(t)} style={{ padding:"9px 14px", borderRadius:10, border:`2px solid ${th.urgente}`, background:th.urgenteBg, color:th.urgente, fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>🗑️ {t}</button>
            ))}
          </div>
          <button onClick={()=>setDeletingTurma(false)} style={{ background:th.input, color:th.textSub, border:`2px solid ${th.inputBorder}`, borderRadius:10, padding:"9px 14px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✕ Cancelar</button>
        </div>
      )}
      {!addingTurma && <div style={{ marginBottom:16 }} />}

      {/* Nome do responsável */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>👤 Nome do Responsável</label>
      <input value={nomeResp} onChange={e=>setNomeResp(e.target.value)} placeholder="Ex: João Silva" style={iS} />

      {/* E-mail */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>📧 E-mail do Responsável</label>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Ex: joao@email.com" style={iS} />

      {/* Celular */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>📱 Celular do Responsável</label>
      <input type="tel" value={celular} onChange={e=>setCelular(e.target.value)} placeholder="Ex: (92) 99999-0000" style={iS} />

      {/* Celular 2 */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>📱 Celular do Responsável 2</label>
      <input type="tel" value={celular2} onChange={e=>setCelular2(e.target.value)} placeholder="Ex: (92) 98888-0000" style={iS} />

      {/* Senha */}
      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>🔒 {modoNovo ? "Senha de Acesso" : "Nova Senha (deixe em branco para manter)"}</label>
      <input type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder={modoNovo ? "Ex: 01011990" : "Deixe em branco para não alterar"} style={iS} />
      <div style={{ fontSize:12, color:th.textMuted, marginTop:-10, marginBottom:16 }}>💡 Use algo simples, ex: data de nascimento do aluno</div>

      {erro && <div style={{ background:th.urgenteBg, border:`2px solid ${th.urgente}`, borderRadius:10, padding:"12px 14px", fontSize:14, color:th.urgente, fontWeight:700, marginBottom:16 }}>⚠️ {erro}</div>}

      <button onClick={confirmar} style={{ width:"100%", padding:16, borderRadius:14, border:"none", background:th.btnPrimary, color:th.btnText, fontSize:18, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>
        ✅ {modoNovo ? "Cadastrar" : "Salvar Alterações"}
      </button>
    </div>
  );
}

function GerenciarAlunos({ alunos, onSalvarAluno, onExcluirAluno, onSalvarTurmas, th }) {
  const [tela,        setTela]        = useState("lista");
  const [selecionado, setSelecionado] = useState(null);
  const [busca,       setBusca]       = useState("");
  const [excluindo,   setExcluindo]   = useState(null);
  const [turmasExtras, setTurmasExtras] = useState(window._turmasExtras || []);
  const [turmasExcluidasGlobal, setTurmasExcluidasGlobal] = useState(window._turmasExcluidas || []);

  const filtrados = alunos.filter(a =>
    (a.filho||"").toLowerCase().includes(busca.toLowerCase()) ||
    (a.nome||"").toLowerCase().includes(busca.toLowerCase())  ||
    (a.turma||"").toLowerCase().includes(busca.toLowerCase())
  );

  const salvar = (dados) => {
    if (tela === "novo") {
      const novoAluno = { ...dados, id:"pai_"+Date.now(), tipo:"pai" };
      onSalvarAluno(novoAluno);
    } else {
      onSalvarAluno({ ...selecionado, ...dados });
    }
    setTela("lista"); setSelecionado(null);
  };

  if (tela === "novo" || tela === "editar") {
    const handleSetTurmasExtras = (fn) => {
      const novas = typeof fn === 'function' ? fn(turmasExtras) : fn;
      setTurmasExtras(novas);
      if (onSalvarTurmas) onSalvarTurmas(novas, turmasExcluidasGlobal);
    };
    const handleSetTurmasExcluidas = (fn) => {
      const novas = typeof fn === 'function' ? fn(turmasExcluidasGlobal) : fn;
      setTurmasExcluidasGlobal(novas);
      if (onSalvarTurmas) onSalvarTurmas(turmasExtras, novas);
    };
    return <FormAluno inicial={selecionado} modoNovo={tela==="novo"} onSalvar={salvar} onVoltar={() => { setTela("lista"); setSelecionado(null); }} th={th} turmasExtras={turmasExtras} setTurmasExtras={handleSetTurmasExtras} turmasExcluidasInit={turmasExcluidasGlobal} setTurmasExcluidasGlobal={handleSetTurmasExcluidas} />;
  }

  return (
    <div>
      {/* Barra de busca + botão novo */}
      <div style={{ display:"flex", gap:10, marginBottom:16 }}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar aluno ou turma..." style={{ flex:1, padding:"12px 14px", borderRadius:12, border:`2px solid ${th.inputBorder}`, fontSize:14, color:th.inputText, background:th.input, outline:"none", fontFamily:"'Nunito',sans-serif" }} />
        <button onClick={() => setTela("novo")} style={{ background:th.btnPrimary, color:th.btnText, border:"none", borderRadius:12, padding:"12px 16px", fontSize:14, fontWeight:800, cursor:"pointer", whiteSpace:"nowrap", fontFamily:"'Nunito',sans-serif" }}>➕ Novo</button>
      </div>

      <div style={{ fontSize:13, color:th.textMuted, marginBottom:12 }}>{filtrados.length} aluno(s) cadastrado(s)</div>

      {/* Modal excluir */}
      {excluindo && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:20 }}>
          <div style={{ background:th.card, borderRadius:20, padding:24, maxWidth:340, width:"100%" }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:12 }}>⚠️</div>
            <div style={{ fontSize:18, fontWeight:800, color:th.text, textAlign:"center", marginBottom:8 }}>Excluir aluno?</div>
            <div style={{ fontSize:14, color:th.textSub, textAlign:"center", marginBottom:20 }}>
              <strong>{excluindo.filho}</strong> — Turma {excluindo.turma}<br/>Resp: {excluindo.nome}<br/><br/>Esta ação não pode ser desfeita.
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setExcluindo(null)} style={{ flex:1, padding:14, borderRadius:12, border:`2px solid ${th.inputBorder}`, background:th.input, color:th.text, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>Cancelar</button>
              <button onClick={() => { onExcluirAluno(excluindo.id); setExcluindo(null); }} style={{ flex:1, padding:14, borderRadius:12, border:"none", background:th.urgente, color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>Excluir</button>
            </div>
          </div>
        </div>
      )}

      {/* Lista */}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtrados.length === 0 && (
          <div style={{ textAlign:"center", padding:40, color:th.textMuted, fontSize:15 }}>Nenhum aluno encontrado.<br/>Toque em <strong>➕ Novo</strong> para cadastrar.</div>
        )}
        {filtrados.map(aluno => (
          <div key={aluno.id} style={{ background:th.card, border:`2px solid ${th.cardBorder}`, borderRadius:16, padding:"14px 16px", display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:44, height:44, borderRadius:"50%", background:th.btnPrimary, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:th.btnText, fontWeight:800, flexShrink:0 }}>{(aluno.filho||"?").charAt(0)}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:16, fontWeight:800, color:th.text }}>{aluno.filho}</div>
              <div style={{ fontSize:13, color:th.textSub }}>Turma <strong>{aluno.turma}</strong> · Resp: {aluno.nome}</div>
              <div style={{ fontSize:12, color:th.textMuted }}>{aluno.email}{aluno.celular ? ` · 📱 ${aluno.celular}` : ""}</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
              <button onClick={() => { setSelecionado(aluno); setTela("editar"); }} style={{ background:th.badgeBg, border:"none", color:th.btnPrimary, borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>✏️ Editar</button>
              <button onClick={() => setExcluindo(aluno)} style={{ background:th.urgenteBg, border:"none", color:th.urgente, borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>🗑️ Excluir</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── NOVO AVISO ────────────────────────────────────────────────────────────────
function NovoAviso({ onSalvar, alunos, th }) {
  const TURMAS_OPCOES = ["6A","6B","7A","7B","8A","8B","9A","9B"];
  const [titulo,       setTitulo]      = useState("");
  const [corpo,        setCorpo]       = useState("");
  const [tipo,         setTipo]        = useState("aviso");
  const [urgente,      setUrgente]     = useState(false);
  const [visibilidade, setVisib]       = useState("todos");
  const [turmas,       setTurmas]      = useState([]);
  const [alunoId,      setAlunoId]     = useState("");
  const [erro,         setErro]        = useState("");

  const iS = { width:"100%", padding:"14px 16px", borderRadius:12, border:`2px solid ${th.inputBorder}`, fontSize:15, color:th.inputText, background:th.input, outline:"none", fontFamily:"'Nunito',sans-serif" };

  const salvar = () => {
    if (!titulo.trim()||!corpo.trim())           { setErro("Preencha o título e o texto."); return; }
    if (visibilidade==="turma"&&turmas.length===0) { setErro("Escolha pelo menos uma turma."); return; }
    if (visibilidade==="aluno"&&!alunoId)         { setErro("Escolha o aluno."); return; }
    onSalvar({ titulo:titulo.trim(), corpo:corpo.trim(), tipo, urgente, visibilidade,
      turmas: visibilidade==="aluno" ? [alunos.find(a=>a.id===alunoId)?.turma].filter(Boolean) : visibilidade==="turma" ? turmas : TURMAS_OPCOES,
      alunoId: visibilidade==="aluno" ? alunoId : null });
  };

  return (
    <div style={{ background:th.card, borderRadius:20, padding:20 }}>
      <div style={{ fontSize:20, fontWeight:900, color:th.text, marginBottom:20 }}>✏️ Escrever Novo Aviso</div>

      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>Título</label>
      <input value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Ex: Reunião de pais dia 28" style={{ ...iS, marginBottom:16 }} />

      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:6 }}>Texto do Aviso</label>
      <textarea value={corpo} onChange={e=>setCorpo(e.target.value)} placeholder="Escreva o recado completo..." rows={5} style={{ ...iS, resize:"vertical", marginBottom:16 }} />

      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:8 }}>Tipo</label>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {Object.entries(COR_TIPO).map(([k,v]) => (
          <button key={k} onClick={()=>setTipo(k)} style={{ padding:"10px 16px", borderRadius:10, border:`2px solid ${tipo===k?v.cor:th.inputBorder}`, background:tipo===k?v.cor+"18":th.input, color:tipo===k?v.cor:th.textSub, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>{v.emoji} {v.label}</button>
        ))}
      </div>

      <div onClick={()=>setUrgente(!urgente)} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20, background:th.urgenteBg, borderRadius:12, padding:"12px 16px", cursor:"pointer" }}>
        <div style={{ width:50, height:28, borderRadius:99, background:urgente?th.urgente:th.inputBorder, position:"relative", transition:"background 0.2s", flexShrink:0 }}>
          <div style={{ width:22, height:22, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left:urgente?25:3, transition:"left 0.2s", boxShadow:"0 1px 4px #0003" }} />
        </div>
        <div>
          <div style={{ fontSize:14, fontWeight:800, color:th.urgente }}>⚡ Marcar como Urgente</div>
          <div style={{ fontSize:12, color:th.textSub }}>O aviso vai aparecer em destaque</div>
        </div>
      </div>

      <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:8 }}>Quem vai ver?</label>
      <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
        {[{key:"todos",emoji:"🌍",label:"Todos os pais",desc:"Todos os responsáveis vão ver"},
          {key:"turma",emoji:"🏫",label:"Só uma turma",desc:"Apenas os pais da turma escolhida"},
          {key:"aluno",emoji:"👤",label:"Só um aluno",desc:"Apenas o responsável pelo aluno"}].map(op => (
          <button key={op.key} onClick={()=>setVisib(op.key)} style={{ padding:"14px 16px", borderRadius:14, border:`2px solid ${visibilidade===op.key?th.btnPrimary:th.inputBorder}`, background:visibilidade===op.key?th.badgeBg:th.input, textAlign:"left", cursor:"pointer", fontFamily:"'Nunito',sans-serif", width:"100%" }}>
            <div style={{ fontSize:15, fontWeight:800, color:visibilidade===op.key?th.btnPrimary:th.text }}>{op.emoji} {op.label}</div>
            <div style={{ fontSize:12, color:th.textSub, marginTop:2 }}>{op.desc}</div>
          </button>
        ))}
      </div>

      {visibilidade==="turma" && (
        <div style={{ marginBottom:16 }}>
          <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:8 }}>Qual turma?</label>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {TURMAS_OPCOES.map(t => (
              <button key={t} onClick={()=>setTurmas(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t])} style={{ padding:"10px 18px", borderRadius:10, border:`2px solid ${turmas.includes(t)?th.btnPrimary:th.inputBorder}`, background:turmas.includes(t)?th.btnPrimary:th.input, color:turmas.includes(t)?th.btnText:th.text, fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>{t}</button>
            ))}
          </div>
        </div>
      )}

      {visibilidade==="aluno" && (
        <div style={{ marginBottom:16 }}>
          <label style={{ display:"block", fontSize:14, fontWeight:700, color:th.text, marginBottom:8 }}>Qual aluno?</label>

function ChatPai({ mensagens, onEnviar, th }) {

    </div>

function formatDataHora(dateStr) {
  const d = new Date(dateStr);
  const hoje = new Date();
  const ontem = new Date(); ontem.setDate(hoje.getDate()-1);
  const hora = d.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" });
  if (d.toDateString() === hoje.toDateString()) return `Hoje às ${hora}`;
  if (d.toDateString() === ontem.toDateString()) return `Ontem às ${hora}`;
  return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit", year:"numeric" }) + ` às ${hora}`;
}

        <div>

          REGULARIZAR E CONTINUAR

      {/* Modal proprietário */}

// ── TELA PROPRIETÁRIO ─────────────────────────────────────────────────────────
function TelaProprietario({ nomeEscola, setNomeEscola, telEscola, setTelEscola, whatsEscola, setWhatsEscola, alunos, onSalvarAluno, onExcluirAluno, comunicados, onExcluirComunicado, themeKey, onChangeTheme, appBloqueado, onSetBloqueado, onSalvarConfigEscola, onVoltar }) {
  const [aba, setAba] = useState("geral");
  const [nomeTemp, setNomeTemp]   = useState(nomeEscola);
  const [telTemp, setTelTemp]     = useState(telEscola);
  const [whatsTemp, setWhatsTemp] = useState(whatsEscola);
  const [salvo, setSalvo]         = useState(false);

  const salvar = () => {
    setNomeEscola(nomeTemp);
    setTelEscola(telTemp);
    setWhatsEscola(whatsTemp);
    if (onSalvarConfigEscola) onSalvarConfigEscola(nomeTemp, telTemp, whatsTemp);
    setSalvo(true);
    setTimeout(() => setSalvo(false), 2500);
  };

  const iS = { width:"100%", padding:"13px 15px", borderRadius:12, border:"2px solid #334", fontSize:15, color:"#eee", background:"#1a1a2e", outline:"none", fontFamily:"'Nunito',sans-serif", marginBottom:14 };

  const ABAS_P = [
    { key:"geral",   label:"⚙️ Geral"    },
    { key:"alunos",  label:"👨‍👩‍👧 Alunos"  },
    { key:"avisos",  label:"📣 Avisos"   },
    { key:"bloqueio",label:"🔒 Bloqueio" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#0d1117", fontFamily:"'Nunito',sans-serif", display:"flex", flexDirection:"column" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');*{box-sizing:border-box}`}</style>

      {/* Header */}
      <div style={{ background:"#12122a", borderBottom:"2px solid #2a2a5a", padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontSize:18, fontWeight:900, color:"#f59e0b" }}>👑 Painel do Proprietário</div>
          <div style={{ fontSize:13, color:"#8888bb" }}>Configurações avançadas</div>
        </div>
        <button onClick={onVoltar} style={{ background:"#1e1e40", border:"2px solid #2a2a5a", color:"#aaa", borderRadius:10, padding:"8px 16px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>← Sair</button>
      </div>

      {/* Abas */}
      <div style={{ display:"flex", background:"#12122a", borderBottom:"2px solid #2a2a5a" }}>
        {ABAS_P.map(a => (
          <button key={a.key} onClick={()=>setAba(a.key)} style={{ flex:1, padding:"13px 4px", border:"none", background:"none", fontSize:12, fontWeight:700, cursor:"pointer", color:aba===a.key?"#f59e0b":"#666", borderBottom:aba===a.key?"3px solid #f59e0b":"3px solid transparent", fontFamily:"'Nunito',sans-serif" }}>
            {a.label}
          </button>
        ))}
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:20 }}>

        {/* ABA GERAL */}
        {aba==="geral" && (
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#f59e0b", marginBottom:20 }}>Configurações da Escola</div>
            <label style={{ display:"block", fontSize:13, fontWeight:700, color:"#aaa", marginBottom:6 }}>🏫 Nome da Escola</label>
            <input value={nomeTemp} onChange={e=>setNomeTemp(e.target.value)} placeholder="Ex: CETI" style={iS} />
            <label style={{ display:"block", fontSize:13, fontWeight:700, color:"#aaa", marginBottom:6 }}>📞 Telefone exibido</label>
            <input value={telTemp} onChange={e=>setTelTemp(e.target.value)} placeholder="Ex: (92) 99276-7068" style={iS} />
            <label style={{ display:"block", fontSize:13, fontWeight:700, color:"#aaa", marginBottom:6 }}>💬 Número WhatsApp (só dígitos com DDI)</label>
            <input value={whatsTemp} onChange={e=>setWhatsTemp(e.target.value)} placeholder="Ex: 5592992767068" style={iS} />
            <label style={{ display:"block", fontSize:13, fontWeight:700, color:"#aaa", marginBottom:8 }}>🎨 Tema visual</label>
            <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
              {[{key:"padrao",label:"Padrão",cor:"#1a5276"},{key:"preto",label:"Dark",cor:"#26262e"},{key:"azul",label:"Azul",cor:"#3b82f6"},{key:"magenta",label:"Rosa",cor:"#ec4899"}].map(t=>(
                <button key={t.key} onClick={()=>onChangeTheme(t.key)} style={{ padding:"10px 16px", borderRadius:10, border:`2px solid ${themeKey===t.key?"#f59e0b":"#2a2a5a"}`, background:themeKey===t.key?"#f59e0b22":"#1a1a2e", color:themeKey===t.key?"#f59e0b":"#aaa", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:8, fontFamily:"'Nunito',sans-serif" }}>
                  <span style={{ width:14, height:14, borderRadius:"50%", background:t.cor, display:"inline-block" }}/>
                  {t.label}
                </button>
              ))}
            </div>
            {salvo && <div style={{ background:"#0a2e1a", border:"2px solid #27ae60", borderRadius:10, padding:"10px 14px", color:"#27ae60", fontWeight:700, fontSize:14, marginBottom:14 }}>✅ Configurações salvas!</div>}
            <button onClick={salvar} style={{ width:"100%", padding:16, borderRadius:14, border:"none", background:"#f59e0b", color:"#12122a", fontSize:16, fontWeight:800, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>💾 Salvar Configurações</button>
          </div>
        )}

        {/* ABA ALUNOS */}
        {aba==="alunos" && (
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#f59e0b", marginBottom:16 }}>Alunos Cadastrados ({alunos.length})</div>
            {alunos.length===0 && <div style={{ color:"#666", textAlign:"center", padding:30 }}>Nenhum aluno cadastrado.</div>}
            {alunos.map(a => (
              <div key={a.id} style={{ background:"#12122a", border:"2px solid #2a2a5a", borderRadius:14, padding:"14px 16px", marginBottom:10 }}>
                <div style={{ fontSize:15, fontWeight:800, color:"#eee" }}>👦 {a.filho} — Turma {a.turma}</div>
                <div style={{ fontSize:13, color:"#8888bb", marginTop:4 }}>Resp: {a.nome}</div>
                <div style={{ fontSize:12, color:"#666", marginTop:2 }}>📧 {a.email} {a.celular ? `· 📱 ${a.celular}` : ""} {a.celular2 ? `· 📱 ${a.celular2}` : ""}</div>
                <button onClick={()=>onExcluirAluno(a.id)} style={{ marginTop:10, padding:"6px 14px", borderRadius:8, border:"2px solid #e74c3c", background:"transparent", color:"#e74c3c", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>🗑️ Excluir</button>
              </div>
            ))}
          </div>
        )}

        {/* ABA AVISOS */}
        {aba==="avisos" && (
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#f59e0b", marginBottom:16 }}>Avisos Publicados ({comunicados.length})</div>
            {comunicados.map(c => (
              <div key={c.id} style={{ background:"#12122a", border:"2px solid #2a2a5a", borderRadius:14, padding:"14px 16px", marginBottom:10 }}>
                <div style={{ fontSize:15, fontWeight:800, color:"#eee" }}>{c.titulo}</div>
                <div style={{ fontSize:12, color:"#8888bb", marginTop:4 }}>Por {c.autor} · {c.tipo} · {c.visibilidade}</div>
                <button onClick={()=>onExcluirComunicado(c.id)} style={{ marginTop:10, padding:"6px 14px", borderRadius:8, border:"2px solid #e74c3c", background:"transparent", color:"#e74c3c", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" }}>🗑️ Excluir aviso</button>
              </div>
            ))}
          </div>
        )}

        {/* ABA BLOQUEIO */}
        {aba==="bloqueio" && (
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#f59e0b", marginBottom:8 }}>🔒 Controle de Acesso</div>
            <div style={{ fontSize:14, color:"#8888bb", marginBottom:24, lineHeight:1.6 }}>
              Quando bloqueado, todos os usuários verão a tela de <strong style={{ color:"#f59e0b" }}>Assinatura Expirada</strong> ao abrir o app.
            </div>
            <div style={{ background:"#12122a", border:`2px solid ${appBloqueado?"#e74c3c":"#27ae60"}`, borderRadius:18, padding:24, textAlign:"center", marginBottom:24 }}>
              <div style={{ fontSize:48, marginBottom:8 }}>{appBloqueado ? "🔒" : "🔓"}</div>
              <div style={{ fontSize:18, fontWeight:900, color:appBloqueado?"#e74c3c":"#27ae60", marginBottom:4 }}>
                App {appBloqueado ? "BLOQUEADO" : "LIBERADO"}
              </div>
              <div style={{ fontSize:13, color:"#666" }}>{appBloqueado ? "Usuários veem tela de assinatura expirada" : "Usuários acessam normalmente"}</div>
            </div>
            <button
              onClick={()=>onSetBloqueado(!appBloqueado)}
              style={{ width:"100%", padding:18, borderRadius:16, border:"none", background:appBloqueado?"#27ae60":"#e74c3c", color:"#fff", fontSize:17, fontWeight:900, cursor:"pointer", fontFamily:"'Nunito',sans-serif", boxShadow:appBloqueado?"0 4px 20px #27ae6044":"0 4px 20px #e74c3c44" }}
            >
              {appBloqueado ? "🔓 Desbloquear App" : "🔒 Bloquear App (Expirar Assinatura)"}
            </button>
          </div>
        )}

      </div>
    </div>
  );
}
